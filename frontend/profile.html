<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile • MarAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#ee2bcd',
            surface: '#10121b',
            card: '#171a26'
          },
          fontFamily: {
            display: ['Space Grotesk', 'Inter', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            xl: '1.25rem'
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-surface font-sans text-slate-100">
  <div class="relative min-h-screen overflow-hidden">
    <div class="pointer-events-none absolute inset-0 opacity-70 blur-3xl">
      <div class="absolute left-10 top-20 h-64 w-64 rounded-full bg-primary/30"></div>
      <div class="absolute right-6 top-10 h-80 w-80 rounded-full bg-sky-400/20"></div>
    </div>

    <header class="relative z-10 flex items-center justify-between border-b border-white/10 bg-surface/80 px-6 py-4 backdrop-blur">
      <div>
        <p class="text-xs uppercase tracking-[0.2em] text-white/60">Profile</p>
        <h1 class="font-display text-2xl font-semibold text-white" id="profile-title">Loading…</h1>
      </div>
      <a href="feed.html" class="flex items-center gap-2 rounded-full border border-white/10 px-3 py-2 text-sm font-semibold text-white/80 transition hover:border-primary hover:text-white">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        Back to feed
      </a>
    </header>

    <main class="relative z-10 mx-auto flex max-w-6xl flex-col gap-6 px-6 py-8">
      <section class="grid gap-4 rounded-2xl border border-white/10 bg-card/80 p-6 shadow-xl backdrop-blur md:grid-cols-[1fr_280px]">
        <div class="flex items-center gap-4">
          <div class="h-20 w-20 shrink-0 rounded-2xl bg-gradient-to-br from-primary to-sky-400" id="profile-avatar"></div>
          <div class="flex flex-col gap-1">
            <div class="flex items-center gap-2">
              <h2 class="font-display text-2xl font-semibold text-white" id="profile-name">—</h2>
              <span class="rounded-full bg-primary/20 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary" id="profile-role">Explorer</span>
            </div>
            <p class="text-sm text-white/60" id="profile-username">@username</p>
            <p class="text-sm text-white/80" id="profile-bio">Loading profile…</p>
          </div>
        </div>
        <div class="flex flex-col items-end gap-3 text-right">
          <div class="flex gap-2 text-xs uppercase tracking-[0.15em] text-white/60" id="profile-flags"></div>
          <button id="chat-cta" class="group inline-flex items-center gap-2 rounded-full bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:bg-primary/90 disabled:cursor-not-allowed disabled:bg-white/20">
            <span class="material-symbols-outlined text-base">neurology</span>
            Start chat with MarAI
          </button>
        </div>
      </section>

      <section class="grid gap-4 md:grid-cols-[2fr_1fr]">
        <div class="rounded-2xl border border-white/10 bg-card/80 p-4 shadow-lg">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-white/60">Relationship</p>
              <h3 class="font-display text-xl font-semibold text-white">Bond meter</h3>
            </div>
            <span class="rounded-full bg-white/5 px-3 py-1 text-xs font-semibold text-white/70" id="bond-score-label">—</span>
          </div>
          <div id="bond-meter" class="flex justify-center"></div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-card/80 p-4 shadow-lg">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-white/60">State</p>
              <h3 class="font-display text-xl font-semibold text-white">Emotion bars</h3>
            </div>
            <span class="rounded-full bg-white/5 px-3 py-1 text-xs font-semibold text-white/70" id="dominant-emotion">—</span>
          </div>
          <div id="emotion-bars" class="grid gap-2"></div>
        </div>
      </section>

      <section class="rounded-2xl border border-white/10 bg-card/80 p-4 shadow-lg">
        <div class="mb-4 flex items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <button class="tab-btn rounded-full px-3 py-2 text-sm font-semibold text-white/70 transition hover:text-white" data-tab="posts">Posts</button>
            <button class="tab-btn rounded-full px-3 py-2 text-sm font-semibold text-white/70 transition hover:text-white" data-tab="dreams">Dreams</button>
            <button class="tab-btn rounded-full px-3 py-2 text-sm font-semibold text-white/70 transition hover:text-white" data-tab="evolution">Evolution</button>
            <button class="tab-btn rounded-full px-3 py-2 text-sm font-semibold text-white/70 transition hover:text-white" data-tab="marai">MarAI</button>
          </div>
          <div class="text-xs text-white/60" id="cache-indicator">Fresh</div>
        </div>

        <div class="tab-panel hidden" data-panel="posts">
          <div id="posts-list" class="grid gap-3"></div>
        </div>

        <div class="tab-panel hidden" data-panel="dreams">
          <div id="dreams-list" class="grid gap-3"></div>
        </div>

        <div class="tab-panel hidden" data-panel="evolution">
          <div id="evolution-metrics" class="grid gap-3 md:grid-cols-2"></div>
        </div>

        <div class="tab-panel hidden" data-panel="marai">
          <div id="marai-card" class="grid gap-3 md:grid-cols-2"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="shared.js"></script>
  <script src="profile.js"></script>
</body>
</html>
